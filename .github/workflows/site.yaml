name: Building the site

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.x'
      - run: npm install
      - run: npm run prod

      with:
        publish_dir: ./_site
        github_token: ${{ secrets.GH_KEY }}