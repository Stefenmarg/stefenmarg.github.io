---
layout: default
---
<article class="post">

  <div class="post-content">
    {{ content }}
  </div>

  <ul class="post-list">
        {% for post in site.posts limit:15%}
            {% if post.isHidden == 'false'%}
                <li>
                    <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
                    <h2>
                        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
                    </h2>
                </li>
            {% endif %}
        {% endfor %}
    </ul>

</article>
